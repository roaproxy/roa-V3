<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuckDuckGo Frame Search</title>
  <style>
    :root {
      --bg: #f3efe5;
      --panel: rgba(255, 252, 245, 0.86);
      --ink: #1d2b24;
      --muted: #5e6a64;
      --accent: #de5833;
      --accent-dark: #b84424;
      --line: rgba(29, 43, 36, 0.12);
      --shadow: 0 20px 50px rgba(53, 42, 25, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(222, 88, 51, 0.2), transparent 28%),
        radial-gradient(circle at bottom right, rgba(106, 156, 137, 0.18), transparent 24%),
        linear-gradient(135deg, #efe8d7 0%, #f7f2e8 44%, #ece5d7 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(1180px, 100%);
      min-height: calc(100vh - 48px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 3vw, 3.4rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      max-width: 70ch;
    }

    form {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    input[type="search"] {
      width: 100%;
      padding: 18px 20px;
      border-radius: 18px;
      border: 1px solid rgba(29, 43, 36, 0.16);
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      font-size: 1rem;
      outline: none;
    }

    input[type="search"]:focus {
      border-color: rgba(222, 88, 51, 0.6);
      box-shadow: 0 0 0 4px rgba(222, 88, 51, 0.12);
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 0 24px;
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, filter 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .results {
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.92rem;
    }

    .bar a {
      color: var(--accent-dark);
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 62vh;
      border: 0;
      background: white;
    }

    code {
      font-family: Consolas, "Courier New", monospace;
      background: rgba(29, 43, 36, 0.06);
      padding: 0.12rem 0.35rem;
      border-radius: 6px;
    }

    @media (max-width: 760px) {
      .shell {
        min-height: auto;
      }

      .hero {
        padding: 22px;
      }

      form {
        grid-template-columns: 1fr;
      }

      button {
        min-height: 54px;
      }

      .bar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel hero">
      <h1>DuckDuckGo in a frame.</h1>
      <p>
        Search stays on this page by sending the query into the embedded frame below.
        This uses DuckDuckGo's non-JavaScript endpoint and includes <code>kd=-1</code> to request redirect-off behavior.
      </p>

      <form action="https://html.duckduckgo.com/html/" method="get" target="ddg-frame">
        <input type="hidden" name="kd" value="-1">
        <input type="hidden" name="kp" value="-1">
        <input type="hidden" name="kl" value="us-en">
        <input type="hidden" name="kav" value="1">
        <input
          type="search"
          name="q"
          placeholder="Search DuckDuckGo"
          autocomplete="off"
          autofocus
          required
        >
        <button type="submit">Search</button>
      </form>
    </section>

    <section class="panel results">
      <div class="bar">
        <span>If DuckDuckGo blocks embedding in your browser, open results directly here:</span>
        <a href="https://html.duckduckgo.com/html/?kd=-1&kp=-1&kl=us-en&q=duckduckgo" target="_blank" rel="noopener noreferrer">
          Open DuckDuckGo
        </a>
      </div>
      <iframe
        name="ddg-frame"
        title="DuckDuckGo search results"
        srcdoc='<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><style>body{margin:0;font-family:Georgia,serif;background:#fbf8f1;color:#1d2b24;display:grid;place-items:center;min-height:100vh;padding:2rem;text-align:center}div{max-width:42rem}h2{margin:0 0 .75rem;font-size:2rem}p{margin:0;color:#5e6a64;line-height:1.6}</style></head><body><div><h2>Search ready</h2><p>Submit a query above and the DuckDuckGo results will load here inside the frame if your browser allows it.</p></div></body></html>'>
      </iframe>
    </section>
  </main>
</body>
</html>
